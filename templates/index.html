<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мессенджер</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 10px; }
        #messages { border: 1px solid #ccc; height: 400px; overflow-y: scroll; padding: 10px; margin: 10px 0; }
        .msg { margin: 5px 0; }
        .username { font-weight: bold; color: #2c3e50; }
        .system { color: #666; font-style: italic; }
        #input-area { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }
        #text-input { flex: 1; min-width: 150px; padding: 8px; }
        button { padding: 8px 12px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; }
        #record-btn { background: #e74c3c; }
        #record-btn.recording { background: #c0392b; animation: pulse 1s infinite; }
        #image-btn { background: #27ae60; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        audio, img { display: block; margin-top: 5px; max-width: 100%; }
        img { max-height: 300px; border-radius: 5px; }
        #status-msg { font-size: 0.9em; color: #555; margin-left: 5px; }
    </style>
</head>
<body>
    <h2>PyMessenger</h2>
    <div>
        <input type="text" id="username" placeholder="Ваше имя" value="Гость">
    </div>
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="text-input" placeholder="Введите сообщение...">
        <button onclick="sendText()">Отправить</button>
        <button id="record-btn" onclick="toggleRecord()">🎤 Запись</button>
        <button id="image-btn" onclick="selectImage()">📷 Фото</button>
        <input type="file" id="image-input" accept="image/*" style="display:none;" onchange="sendImage(this)">
        <span id="status-msg"></span>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const socket = io();
        const messagesDiv = document.getElementById('messages');
        const textInput = document.getElementById('text-input');
        const usernameInput = document.getElementById('username');
        const recordBtn = document.getElementById('record-btn');
        const imageBtn = document.getElementById('image-btn');
        const imageInput = document.getElementById('image-input');
        const statusMsg = document.getElementById('status-msg');

        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;

        // ----- Вспомогательные функции для сообщений -----
        function addSystemMessage(text) {
            const div = document.createElement('div');
            div.className = 'msg system';
            div.textContent = text;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addTextMessage(username, text) {
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `<span class="username">${escapeHtml(username)}:</span> ${escapeHtml(text)}`;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addVoiceMessage(username, audioBase64) {
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `<span class="username">${escapeHtml(username)}:</span> голосовое сообщение<br>`;
            const audio = document.createElement('audio');
            audio.controls = true;
            audio.src = "data:audio/webm;base64," + audioBase64;
            div.appendChild(audio);
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addImageMessage(username, imageBase64, mime) {
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `<span class="username">${escapeHtml(username)}:</span> фото<br>`;
            const img = document.createElement('img');
            img.src = `data:${mime};base64,${imageBase64}`;
            img.onload = () => { messagesDiv.scrollTop = messagesDiv.scrollHeight; };
            div.appendChild(img);
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ----- Текстовые сообщения -----
        function sendText() {
            const text = textInput.value.trim();
            if (!text) return;
            socket.emit('text_message', {
                username: usernameInput.value || 'Аноним',
                text: text
            });
            textInput.value = '';
        }

        textInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendText();
        });

        // ----- Голосовые сообщения -----
        async function toggleRecord() {
            if (!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];

                    mediaRecorder.ondataavailable = event => {
                        if (event.data.size > 0) audioChunks.push(event.data);
                    };

                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        const reader = new FileReader();
                        reader.onloadend = () => {
                            const base64 = reader.result.split(',')[1];
                            socket.emit('voice_message', {
                                username: usernameInput.value || 'Аноним',
                                audio: base64
                            });
                        };
                        reader.readAsDataURL(audioBlob);
                        stream.getTracks().forEach(track => track.stop());
                    };

                    mediaRecorder.start();
                    isRecording = true;
                    recordBtn.textContent = '⏹ Стоп';
                    recordBtn.classList.add('recording');
                } catch (err) {
                    alert('Нет доступа к микрофону: ' + err.message);
                }
            } else {
                if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                    mediaRecorder.stop();
                }
                isRecording = false;
                recordBtn.textContent = '🎤 Запись';
                recordBtn.classList.remove('recording');
            }
        }

        // ----- Фото с сжатием -----
        const MAX_ORIGINAL_MB = 30;        // разрешённый исходный размер
        const MAX_FINAL_BASE64_MB = 5;     // целевой размер после сжатия (в МБ для base64)
        const TARGET_IMAGE_PX = 1600;      // максимальная сторона после сжатия

        function selectImage() {
            imageInput.click();
        }

        function sendImage(input) {
            const file = input.files[0];
            if (!file) return;

            // Проверка на максимальный исходный размер
            if (file.size > MAX_ORIGINAL_MB * 1024 * 1024) {
                alert(`Файл слишком большой. Максимальный размер: ${MAX_ORIGINAL_MB} МБ.`);
                imageInput.value = '';
                return;
            }

            statusMsg.textContent = 'Обработка фото...';

            // Если файл уже ≤ 5 МБ, отправляем без сжатия
            if (file.size <= MAX_FINAL_BASE64_MB * 1024 * 1024) {
                readAndSend(file);
                return;
            }

            // Иначе сжимаем
            compressImage(file, (compressedFile) => {
                readAndSend(compressedFile);
            });
        }

        function readAndSend(file) {
            const reader = new FileReader();
            reader.onload = () => {
                const base64 = reader.result.split(',')[1];
                const mime = file.type || 'image/jpeg';
                socket.emit('image_message', {
                    username: usernameInput.value || 'Аноним',
                    image: base64,
                    mime: mime
                });
                imageInput.value = '';
                statusMsg.textContent = '';
            };
            reader.onerror = () => {
                alert('Ошибка чтения файла.');
                imageInput.value = '';
                statusMsg.textContent = '';
            };
            reader.readAsDataURL(file);
        }

        function compressImage(file, callback) {
            const img = new Image();
            const url = URL.createObjectURL(file);
            img.onload = () => {
                URL.revokeObjectURL(url);

                // Определяем новые размеры
                let { width, height } = img;
                const maxDim = TARGET_IMAGE_PX;
                if (width > maxDim || height > maxDim) {
                    if (width > height) {
                        height = (height / width) * maxDim;
                        width = maxDim;
                    } else {
                        width = (width / height) * maxDim;
                        height = maxDim;
                    }
                }

                // Пытаемся подобрать качество, чтобы итоговый файл был меньше лимита
                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);

                const tryQuality = (quality) => {
                    canvas.toBlob((blob) => {
                        if (!blob) {
                            // Если не получилось, отправляем что есть
                            canvas.toBlob((fallback) => callback(fallback), 'image/jpeg', 0.5);
                            return;
                        }
                        // Пересчитываем размер base64 (примерно blob.size * 4/3)
                        const estimatedBase64MB = (blob.size * 1.37) / (1024 * 1024); 
                        if (estimatedBase64MB <= MAX_FINAL_BASE64_MB || quality <= 0.3) {
                            callback(blob);
                        } else {
                            // Уменьшаем качество на 0.15
                            tryQuality(Math.max(0.3, quality - 0.15));
                        }
                    }, 'image/jpeg', quality);
                };

                tryQuality(0.7); // начальное качество
            };
            img.onerror = () => {
                alert('Не удалось загрузить изображение для сжатия.');
                imageInput.value = '';
                statusMsg.textContent = '';
            };
            img.src = url;
        }

        // ----- Обработчики сокета -----
        socket.on('connect', () => addSystemMessage('✅ Вы подключены'));
        socket.on('user_joined', (data) => addSystemMessage(data.msg));
        socket.on('user_left', (data) => addSystemMessage(data.msg));
        socket.on('text_message', (data) => addTextMessage(data.username, data.text));
        socket.on('voice_message', (data) => addVoiceMessage(data.username, data.audio));
        socket.on('image_message', (data) => addImageMessage(data.username, data.image, data.mime));
    </script>
</body>
</html>
