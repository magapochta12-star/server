<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PyMessenger</title>
    <style>
        :root {
            --bg: #e8ecf0;
            --surface: #ffffff;
            --primary: #2a9d8f;
            --primary-text: #ffffff;
            --text: #1c1e21;
            --secondary-text: #65676b;
            --border: #d0d5dd;
            --my-msg: #dcf8c6;
            --other-msg: #ffffff;
            --shadow: 0 1px 2px rgba(0,0,0,0.1);
            --radius: 12px;
            --transition: 0.2s ease;
        }
        .dark-theme {
            --bg: #1f1f1f;
            --surface: #2c2c2c;
            --primary: #4a9e8f;
            --primary-text: #ffffff;
            --text: #e0e0e0;
            --secondary-text: #a0a0a0;
            --border: #3a3a3a;
            --my-msg: #2a5a4a;
            --other-msg: #2c2c2c;
            --shadow: 0 1px 4px rgba(0,0,0,0.5);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            max-width: 700px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            color: var(--text);
            transition: background var(--transition), color var(--transition);
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 15px; background: var(--surface);
            border-bottom: 1px solid var(--border); box-shadow: var(--shadow); z-index: 2;
        }
        .header h2 { font-size: 1.2em; font-weight: 600; }
        .theme-toggle {
            background: none; border: none; font-size: 1.3em;
            cursor: pointer; color: var(--text); padding: 5px;
        }
        .user-settings {
            display: flex; align-items: center; gap: 8px;
            padding: 6px 15px; background: var(--surface);
            border-bottom: 1px solid var(--border); font-size: 0.9em;
        }
        .user-settings input {
            flex: 1; padding: 6px 10px; border: 1px solid var(--border);
            border-radius: 6px; background: var(--bg); color: var(--text);
            font-size: 0.9em; outline: none;
        }
        .user-settings button {
            background: var(--primary); color: var(--primary-text);
            border: none; border-radius: 6px; padding: 6px 12px;
            cursor: pointer; font-size: 0.85em; white-space: nowrap;
        }
        #user-list {
            font-size: 0.8em; padding: 5px 15px; background: var(--surface);
            border-bottom: 1px solid var(--border); white-space: nowrap; overflow-x: auto;
        }
        #user-list span {
            background: var(--primary); color: var(--primary-text);
            padding: 2px 10px; border-radius: 15px; margin: 0 3px; font-size: 0.8em;
        }
        .chat-container {
            flex: 1; overflow-y: auto; padding: 10px 15px;
            display: flex; flex-direction: column; gap: 8px;
            background: var(--bg); scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch; touch-action: pan-y;
        }
        .message {
            display: flex; flex-direction: column; max-width: 80%;
            padding: 8px 12px; border-radius: var(--radius);
            box-shadow: var(--shadow); animation: fadeInUp 0.3s ease;
            word-wrap: break-word; position: relative;
        }
        .message.my {
            align-self: flex-end; background: var(--my-msg);
            border-bottom-right-radius: 4px;
        }
        .message.other {
            align-self: flex-start; background: var(--other-msg);
            border-bottom-left-radius: 4px;
        }
        .message .sender {
            font-weight: 600; font-size: 0.85em; color: var(--primary); margin-bottom: 2px;
        }
        .message .text { font-size: 0.95em; line-height: 1.4; }
        .message .time {
            font-size: 0.7em; color: var(--secondary-text);
            align-self: flex-end; margin-top: 2px;
        }
        .message.system {
            align-self: center; background: transparent; box-shadow: none;
            color: var(--secondary-text); font-style: italic; font-size: 0.85em;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message img, .message audio {
            max-width: 100%; border-radius: 8px; margin-top: 5px;
        }
        .file-link {
            display: inline-block; margin-top: 5px; padding: 6px 10px;
            background: var(--primary); color: var(--primary-text);
            border-radius: 20px; text-decoration: none; font-size: 0.85em;
        }

        .status-bar {
            padding: 4px 15px; background: transparent;
            display: flex; flex-direction: column; gap: 2px;
            min-height: 2.2em; font-size: 0.85em; color: var(--primary);
            font-weight: 500; overflow: hidden;
        }
        .status-text {
            display: inline-block;
            background: linear-gradient(135deg,
                rgba(42,157,143,0.1) 0%, rgba(42,157,143,1) 25%,
                rgba(42,157,143,0.1) 50%, rgba(42,157,143,1) 75%,
                rgba(42,157,143,0.1) 100%);
            background-size: 200% 100%;
            -webkit-background-clip: text; background-clip: text;
            color: transparent;
            animation: shimmer 3s infinite linear;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .progress-bar {
            height: 3px; background: var(--border); border-radius: 2px;
            overflow: hidden; margin-top: 1px; display: none;
        }
        .progress-bar.active { display: block; }
        .progress-fill {
            width: 0%; height: 100%;
            background: var(--primary);
            animation: fillBar 4s ease forwards;
        }
        @keyframes fillBar {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        .input-panel {
            background: var(--surface); padding: 8px 12px;
            border-top: 1px solid var(--border); display: flex; gap: 6px;
            align-items: center; box-shadow: 0 -1px 4px rgba(0,0,0,0.05);
            z-index: 10;
            padding-bottom: calc(15px + env(safe-area-inset-bottom, 0px));
        }
        #text-input {
            flex: 1; padding: 8px 12px; border: 1px solid var(--border);
            border-radius: 20px; outline: none; background: var(--bg);
            color: var(--text); font-size: 0.9em;
        }
        .input-panel button {
            background: var(--primary); color: var(--primary-text);
            border: none; border-radius: 50%; width: 38px; height: 38px;
            font-size: 1.1em; cursor: pointer; display: flex;
            align-items: center; justify-content: center;
            transition: 0.2s; box-shadow: var(--shadow); flex-shrink: 0;
        }
        .input-panel button:active { transform: scale(0.95); }
        .input-panel button.record { background: #e74c3c; }

        @media (max-width: 500px) {
            .header { padding: 6px 10px; }
            .header h2 { font-size: 1.1em; }
            .theme-toggle { font-size: 1.2em; }
            .user-settings { padding: 5px 10px; gap: 5px; }
            .user-settings input { padding: 5px 8px; font-size: 0.85em; }
            .user-settings button { padding: 5px 10px; font-size: 0.8em; }
            #user-list { padding: 4px 10px; font-size: 0.75em; }
            .chat-container { padding: 8px 10px; gap: 6px; }
            .message { max-width: 90%; padding: 6px 10px; }
            .message .text { font-size: 0.9em; }
            .status-bar { padding: 4px 10px; font-size: 0.8em; }
            .input-panel { padding: 6px 8px; gap: 4px; }
            #text-input { padding: 6px 10px; font-size: 0.85em; }
            .input-panel button { width: 34px; height: 34px; font-size: 1em; }
        }
        @media (max-width: 375px) {
            .input-panel button { width: 30px; height: 30px; font-size: 0.9em; }
            #text-input { padding: 5px 8px; font-size: 0.8em; }
            .user-settings input { font-size: 0.8em; }
            .user-settings button { padding: 4px 8px; font-size: 0.75em; }
            .message { max-width: 95%; padding: 5px 8px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>PyMessenger</h2>
        <button class="theme-toggle" id="theme-toggle">🌙</button>
    </div>

    <div class="user-settings">
        <input type="text" id="username" placeholder="Ваше имя" value="Гость">
        <button onclick="requestNotificationPermission()">🔔</button>
    </div>

    <div id="user-list"><span id="online-users"></span></div>

    <div class="chat-container" id="chat-container">
        <div id="messages"></div>
    </div>

    <div class="status-bar" id="status-bar">
        <div id="typing-indicator" class="status-text"></div>
        <div id="action-status" class="status-text"></div>
        <div class="progress-bar" id="progress-bar"><div class="progress-fill"></div></div>
    </div>

    <div class="input-panel" id="input-panel">
        <input type="text" id="text-input" placeholder="Сообщение...">
        <button onclick="sendText()" title="Отправить">➤</button>
        <button class="record" id="record-btn" onclick="toggleRecord()">🎤</button>
        <button onclick="selectImage()">🖼️</button>
        <button onclick="selectFile()">📎</button>
        <input type="file" id="image-input" accept="image/*" style="display:none;" onchange="sendImage(this)">
        <input type="file" id="file-input" style="display:none;" onchange="sendFile(this)">
    </div>

</body>
</html>
