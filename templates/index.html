<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PyMessenger</title>
    <style>
        :root {
            --bg: #e8ecf0;
            --surface: #ffffff;
            --primary: #2a9d8f;
            --primary-text: #ffffff;
            --text: #1c1e21;
            --secondary-text: #65676b;
            --border: #d0d5dd;
            --my-msg: #dcf8c6;
            --other-msg: #ffffff;
            --shadow: 0 1px 2px rgba(0,0,0,0.1);
            --radius: 12px;
            --transition: 0.2s ease;
        }
        .dark-theme {
            --bg: #1f1f1f;
            --surface: #2c2c2c;
            --primary: #4a9e8f;
            --primary-text: #ffffff;
            --text: #e0e0e0;
            --secondary-text: #a0a0a0;
            --border: #3a3a3a;
            --my-msg: #2a5a4a;
            --other-msg: #2c2c2c;
            --shadow: 0 1px 4px rgba(0,0,0,0.5);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            max-width: 700px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            color: var(--text);
            transition: background var(--transition), color var(--transition);
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 15px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow);
            z-index: 2;
        }
        .header h2 { font-size: 1.2em; font-weight: 600; }
        .theme-toggle {
            background: none; border: none;
            font-size: 1.3em; cursor: pointer; color: var(--text); padding: 5px;
        }
        .user-settings {
            display: flex; align-items: center; gap: 8px;
            padding: 6px 15px; background: var(--surface);
            border-bottom: 1px solid var(--border); font-size: 0.9em;
        }
        .user-settings input {
            flex: 1; padding: 6px 10px;
            border: 1px solid var(--border); border-radius: 6px;
            background: var(--bg); color: var(--text); font-size: 0.9em; outline: none;
        }
        .user-settings button {
            background: var(--primary); color: var(--primary-text);
            border: none; border-radius: 6px; padding: 6px 12px;
            cursor: pointer; font-size: 0.85em; white-space: nowrap;
        }
        #user-list {
            font-size: 0.8em; padding: 5px 15px; background: var(--surface);
            border-bottom: 1px solid var(--border); white-space: nowrap; overflow-x: auto;
        }
        #user-list span {
            background: var(--primary); color: var(--primary-text);
            padding: 2px 10px; border-radius: 15px; margin: 0 3px; font-size: 0.8em;
        }
        .chat-container {
            flex: 1; overflow-y: auto; padding: 10px 15px;
            display: flex; flex-direction: column; gap: 8px;
            background: var(--bg); scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch; touch-action: pan-y;
        }
        .message {
            display: flex; flex-direction: column; max-width: 80%;
            padding: 8px 12px; border-radius: var(--radius);
            box-shadow: var(--shadow); animation: fadeInUp 0.3s ease;
            word-wrap: break-word; position: relative;
        }
        .message.my {
            align-self: flex-end; background: var(--my-msg);
            border-bottom-right-radius: 4px;
        }
        .message.other {
            align-self: flex-start; background: var(--other-msg);
            border-bottom-left-radius: 4px;
        }
        .message .sender {
            font-weight: 600; font-size: 0.85em; color: var(--primary); margin-bottom: 2px;
        }
        .message .text { font-size: 0.95em; line-height: 1.4; }
        .message .time {
            font-size: 0.7em; color: var(--secondary-text);
            align-self: flex-end; margin-top: 2px;
        }
        .message.system {
            align-self: center; background: transparent; box-shadow: none;
            color: var(--secondary-text); font-style: italic; font-size: 0.85em;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message img, .message audio {
            max-width: 100%; border-radius: 8px; margin-top: 5px;
        }
        .file-link {
            display: inline-block; margin-top: 5px; padding: 6px 10px;
            background: var(--primary); color: var(--primary-text);
            border-radius: 20px; text-decoration: none; font-size: 0.85em;
        }

        /* Статус-бар */
        .status-bar {
            padding: 4px 15px; background: transparent;
            display: flex; flex-direction: column; gap: 2px;
            min-height: 2.2em; font-size: 0.85em; color: var(--primary);
            font-weight: 500; overflow: hidden;
        }
        .status-text {
            display: inline-block;
            background: linear-gradient(135deg,
                rgba(42,157,143,0.1) 0%, rgba(42,157,143,1) 25%,
                rgba(42,157,143,0.1) 50%, rgba(42,157,143,1) 75%,
                rgba(42,157,143,0.1) 100%);
            background-size: 200% 100%;
            -webkit-background-clip: text; background-clip: text;
            color: transparent;
            animation: shimmer 3s infinite linear;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .progress-bar {
            height: 3px; background: var(--border); border-radius: 2px;
            overflow: hidden; margin-top: 1px; display: none;
        }
        .progress-bar.active { display: block; }
        .progress-fill {
            width: 0%; height: 100%;
            background: var(--primary);
            animation: fillBar 4s ease forwards;
        }
        @keyframes fillBar {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        /* Панель ввода */
        .input-panel {
            background: var(--surface); padding: 8px 12px;
            border-top: 1px solid var(--border); display: flex; gap: 6px;
            align-items: center; box-shadow: 0 -1px 4px rgba(0,0,0,0.05);
            z-index: 10; margin-bottom: 0;
        }
        #text-input {
            flex: 1; padding: 8px 12px; border: 1px solid var(--border);
            border-radius: 20px; outline: none; background: var(--bg);
            color: var(--text); font-size: 0.9em;
        }
        .input-panel button {
            background: var(--primary); color: var(--primary-text);
            border: none; border-radius: 50%; width: 38px; height: 38px;
            font-size: 1.1em; cursor: pointer; display: flex;
            align-items: center; justify-content: center;
            transition: 0.2s; box-shadow: var(--shadow); flex-shrink: 0;
        }
        .input-panel button:active { transform: scale(0.95); }
        .input-panel button.record { background: #e74c3c; }

        @media (max-width: 500px) {
            .input-panel { margin-bottom: 75px; }
            .header { padding: 6px 10px; }
            .header h2 { font-size: 1.1em; }
            .theme-toggle { font-size: 1.2em; }
            .user-settings { padding: 5px 10px; gap: 5px; }
            .user-settings input { padding: 5px 8px; font-size: 0.85em; }
            .user-settings button { padding: 5px 10px; font-size: 0.8em; }
            #user-list { padding: 4px 10px; font-size: 0.75em; }
            .chat-container { padding: 8px 10px; gap: 6px; }
            .message { max-width: 90%; padding: 6px 10px; }
            .message .text { font-size: 0.9em; }
            .status-bar { padding: 4px 10px; font-size: 0.8em; }
            .input-panel { padding: 6px 8px; gap: 4px; }
            #text-input { padding: 6px 10px; font-size: 0.85em; }
            .input-panel button { width: 34px; height: 34px; font-size: 1em; }
        }
        @media (max-width: 375px) {
            .input-panel button { width: 30px; height: 30px; font-size: 0.9em; }
            #text-input { padding: 5px 8px; font-size: 0.8em; }
            .user-settings input { font-size: 0.8em; }
            .user-settings button { padding: 4px 8px; font-size: 0.75em; }
            .message { max-width: 95%; padding: 5px 8px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>PyMessenger</h2>
        <button class="theme-toggle" id="theme-toggle">🌙</button>
    </div>

    <div class="user-settings">
        <input type="text" id="username" placeholder="Ваше имя" value="Гость">
        <button onclick="requestNotificationPermission()">🔔</button>
    </div>

    <div id="user-list"><span id="online-users"></span></div>

    <div class="chat-container" id="chat-container">
        <div id="messages"></div>
    </div>

    <div class="status-bar" id="status-bar">
        <div id="typing-indicator" class="status-text"></div>
        <div id="action-status" class="status-text"></div>
        <div class="progress-bar" id="progress-bar"><div class="progress-fill"></div></div>
    </div>

    <div class="input-panel" id="input-panel">
        <input type="text" id="text-input" placeholder="Сообщение...">
        <button onclick="sendText()" title="Отправить">➤</button>
        <button class="record" id="record-btn" onclick="toggleRecord()">🎤</button>
        <button onclick="selectImage()">🖼️</button>
        <button onclick="selectFile()">📎</button>
        <input type="file" id="image-input" accept="image/*" style="display:none;" onchange="sendImage(this)">
        <input type="file" id="file-input" style="display:none;" onchange="sendFile(this)">
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const socket = io();
        const chatContainer = document.getElementById('chat-container');
        const messagesDiv = document.getElementById('messages');
        const textInput = document.getElementById('text-input');
        const usernameInput = document.getElementById('username');
        const recordBtn = document.getElementById('record-btn');
        const typingIndicator = document.getElementById('typing-indicator');
        const actionStatus = document.getElementById('action-status');
        const progressBar = document.getElementById('progress-bar');
        const onlineUsersSpan = document.getElementById('online-users');
        const themeToggle = document.getElementById('theme-toggle');

        let mediaRecorder, audioChunks = [], isRecording = false, notificationsEnabled = false;
        let localUsername = usernameInput.value.trim() || 'Гость';
        let typingTimer;

        // ---------- Тема ----------
        function applyTheme(theme) {
            document.body.classList.toggle('dark-theme', theme === 'dark');
            themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
            localStorage.setItem('theme', theme);
        }
        themeToggle.onclick = () => applyTheme(document.body.classList.contains('dark-theme') ? 'light' : 'dark');
        applyTheme(localStorage.getItem('theme') || 'light');

        // ---------- Уведомления ----------
        function notifyIfHidden(username, type, preview) {
            if (document.hidden && notificationsEnabled && 'Notification' in window && Notification.permission === 'granted') {
                new Notification(`${username}: ${type}`, { body: preview.substring(0, 100) });
            }
            if (document.hidden) {
                document.title = '🔔 Новое сообщение';
                setTimeout(() => { if (!document.hidden) document.title = 'PyMessenger'; }, 2000);
            }
        }
        function requestNotificationPermission() {
            if (!('Notification' in window)) return alert('Браузер не поддерживает уведомления');
            if (Notification.permission === 'granted') {
                notificationsEnabled = true;
                alert('Уведомления уже включены');
                return;
            }
            if (Notification.permission === 'denied') {
                alert('Уведомления заблокированы. Разблокируйте в настройках браузера для этого сайта.');
                return;
            }
            Notification.requestPermission().then(p => {
                notificationsEnabled = p === 'granted';
                if (p === 'granted') alert('Уведомления включены!');
                else if (p === 'denied') alert('Запрос отклонён.');
            });
        }
        if ('Notification' in window && Notification.permission === 'granted') notificationsEnabled = true;

        // ---------- Вспомогательные функции ----------
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' КБ';
            return (bytes / (1024 * 1024)).toFixed(1) + ' МБ';
        }
        function getTime() {
            const now = new Date();
            return now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
        }

        // ---------- Управление статусом и прогрессом ----------
        function setStatusText(element, text) {
            if (text) {
                element.textContent = text;
                element.classList.add('status-text');
            } else {
                element.textContent = '';
                element.classList.remove('status-text');
            }
        }
        function showProgress(show) {
            if (show) {
                progressBar.classList.add('active');
                // перезапускаем анимацию
                progressBar.querySelector('.progress-fill').style.animation = 'none';
                progressBar.offsetHeight; // reflow
                progressBar.querySelector('.progress-fill').style.animation = 'fillBar 4s ease forwards';
            } else {
                progressBar.classList.remove('active');
            }
        }

        // ---------- Сообщения ----------
        function addMessage(type, username, content, extra) {
            const div = document.createElement('div');
            div.className = 'message';
            const isMy = (username === localUsername);
            if (type === 'system') {
                div.classList.add('system');
                div.innerHTML = `${content} <span class="time">${getTime()}</span>`;
            } else {
                div.classList.add(isMy ? 'my' : 'other');
                if (!isMy && username) div.innerHTML += `<span class="sender">${escapeHtml(username)}</span>`;
                if (type === 'text') {
                    div.innerHTML += `<span class="text">${escapeHtml(content)}</span>`;
                    notifyIfHidden(username, 'сообщение', content.substring(0, 100));
                } else if (type === 'voice') {
                    div.innerHTML += '🎤 Голосовое сообщение';
                    const audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = "data:audio/webm;base64," + content;
                    div.appendChild(audio);
                    notifyIfHidden(username, 'голосовое', '');
                } else if (type === 'image') {
                    div.innerHTML += '📷 Фото';
                    const img = document.createElement('img');
                    img.src = `data:${extra.mime};base64,${content}`;
                    div.appendChild(img);
                    notifyIfHidden(username, 'фото', '');
                } else if (type === 'file') {
                    div.innerHTML += `📎 ${escapeHtml(extra.filename)} (${formatSize(extra.size)})`;
                    const a = document.createElement('a');
                    a.href = `data:${extra.mime};base64,${content}`;
                    a.download = extra.filename;
                    a.className = 'file-link';
                    a.textContent = 'Скачать';
                    div.appendChild(a);
                    notifyIfHidden(username, 'файл', extra.filename);
                }
                div.innerHTML += `<span class="time">${getTime()}</span>`;
            }
            messagesDiv.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // ---------- Отправка текста ----------
        function sendText() {
            const text = textInput.value.trim();
            if (!text) return;
            socket.emit('text_message', { username: localUsername, text });
            socket.emit('typing', { username: localUsername, typing: false });
            textInput.value = '';
        }

        textInput.addEventListener('input', () => {
            const typing = textInput.value.trim().length > 0;
            socket.emit('typing', { username: localUsername, typing });
            clearTimeout(typingTimer);
            if (typing) typingTimer = setTimeout(() => socket.emit('typing', { username: localUsername, typing: false }), 3000);
        });
        textInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendText();
        });

        // ---------- Голосовые сообщения ----------
        async function toggleRecord() {
            if (!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
                    mediaRecorder.onstop = () => {
                        const blob = new Blob(audioChunks, { type: 'audio/webm' });
                        const reader = new FileReader();
                        reader.onloadend = () => {
                            const base64 = reader.result.split(',')[1];
                            socket.emit('voice_message', { username: localUsername, audio: base64 });
                            // статус снимется при получении своего же voice_message
                        };
                        reader.readAsDataURL(blob);
                        stream.getTracks().forEach(t => t.stop());
                    };
                    mediaRecorder.start();
                    isRecording = true;
                    recordBtn.textContent = '⏹';
                    recordBtn.classList.add('recording');
                    socket.emit('action_status', { username: localUsername, action: 'recording' });
                } catch (err) {
                    alert('Нет доступа к микрофону: ' + err.message);
                }
            } else {
                if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                    mediaRecorder.stop();
                }
                isRecording = false;
                recordBtn.textContent = '🎤';
                recordBtn.classList.remove('recording');
            }
        }

        // ---------- Фото и файлы ----------
        const MAX_ORIGINAL_MB = 30, MAX_FINAL_BASE64_MB = 5, TARGET_IMAGE_PX = 1600;
        function selectImage() { document.getElementById('image-input').click(); }
        function sendImage(input) {
            const file = input.files[0];
            if (!file) return;
            if (file.size > MAX_ORIGINAL_MB * 1024 * 1024) {
                alert(`Максимум ${MAX_ORIGINAL_MB} МБ`);
                input.value = '';
                return;
            }
            socket.emit('action_status', { username: localUsername, action: 'sending_photo' });
            showProgress(true);
            if (file.size <= MAX_FINAL_BASE64_MB * 1024 * 1024) {
                readAndSendImage(file);
            } else {
                compressImage(file, (blob) => readAndSendImage(blob));
            }
        }
        function readAndSendImage(file) {
            const reader = new FileReader();
            reader.onload = () => {
                const base64 = reader.result.split(',')[1];
                const mime = file.type || 'image/jpeg';
                socket.emit('image_message', { username: localUsername, image: base64, mime });
                // статус и прогресс снимаются при получении своего же image_message
            };
            reader.readAsDataURL(file);
        }
        function compressImage(file, callback) {
            const img = new Image();
            const url = URL.createObjectURL(file);
            img.onload = () => {
                URL.revokeObjectURL(url);
                let { width, height } = img;
                if (width > TARGET_IMAGE_PX || height > TARGET_IMAGE_PX) {
                    if (width > height) { height = (height / width) * TARGET_IMAGE_PX; width = TARGET_IMAGE_PX; }
                    else { width = (width / height) * TARGET_IMAGE_PX; height = TARGET_IMAGE_PX; }
                }
                const canvas = document.createElement('canvas');
                canvas.width = width; canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                const tryQuality = (q) => {
                    canvas.toBlob((blob) => {
                        if (!blob) { canvas.toBlob(fb => callback(fb), 'image/jpeg', 0.5); return; }
                        const est = (blob.size * 1.37) / (1024 * 1024);
                        if (est <= MAX_FINAL_BASE64_MB || q <= 0.3) callback(blob);
                        else tryQuality(Math.max(0.3, q - 0.15));
                    }, 'image/jpeg', q);
                };
                tryQuality(0.7);
            };
            img.src = url;
        }

        function selectFile() { document.getElementById('file-input').click(); }
        function sendFile(input) {
            const file = input.files[0];
            if (!file) return;
            if (file.size > 10 * 1024 * 1024) {
                alert('Максимум 10 МБ');
                input.value = '';
                return;
            }
            socket.emit('action_status', { username: localUsername, action: 'sending_file' });
            showProgress(true);
            const reader = new FileReader();
            reader.onload = () => {
                const base64 = reader.result.split(',')[1];
                socket.emit('file_message', {
                    username: localUsername,
                    filename: file.name,
                    file_data: base64,
                    mime: file.type || 'application/octet-stream',
                    size: file.size
                });
                // статус и прогресс снимаются при получении своего же file_message
            };
            reader.readAsDataURL(file);
        }

        // ---------- Регистрация и онлайн ----------
        usernameInput.addEventListener('change', () => {
            localUsername = usernameInput.value.trim() || 'Гость';
            socket.emit('register', { username: localUsername });
        });
        socket.on('connect', () => {
            localUsername = usernameInput.value.trim() || 'Гость';
            socket.emit('register', { username: localUsername });
        });
        socket.on('update_user_list', (users) => {
            onlineUsersSpan.innerHTML = '';
            users.forEach(u => {
                if (u !== localUsername) {
                    const span = document.createElement('span');
                    span.textContent = u;
                    onlineUsersSpan.appendChild(span);
                }
            });
        });

        // ---------- История текстовых сообщений ----------
        socket.on('text_history', (messages) => {
            messages.forEach(msg => addMessage('text', msg.username, msg.text));
        });

        // ---------- Индикаторы и снятие статуса при получении своих сообщений ----------
        socket.on('typing', (data) => {
            setStatusText(typingIndicator, data.typing ? `${data.username} печатает...` : '');
        });

        socket.on('action_status', (data) => {
            if (data.action === 'recording') setStatusText(actionStatus, `${data.username} записывает аудио...`);
            else if (data.action === 'sending_photo') setStatusText(actionStatus, `${data.username} отправляет фото...`);
            else if (data.action === 'sending_file') setStatusText(actionStatus, `${data.username} отправляет файл...`);
            else setStatusText(actionStatus, '');
        });

        // При получении своего медиа сообщения – убираем статус и прогресс
        function clearMyStatus(username) {
            if (username === localUsername) {
                setStatusText(actionStatus, '');
                showProgress(false);
            }
        }

        socket.on('text_message', (d) => addMessage('text', d.username, d.text));
        socket.on('voice_message', (d) => {
            addMessage('voice', d.username, d.audio);
            clearMyStatus(d.username);
        });
        socket.on('image_message', (d) => {
            addMessage('image', d.username, d.image, { mime: d.mime });
            clearMyStatus(d.username);
        });
        socket.on('file_message', (d) => {
            addMessage('file', d.username, d.file_data, { filename: d.filename, mime: d.mime, size: d.size });
            clearMyStatus(d.username);
        });
        socket.on('user_joined', (d) => addMessage('system', '', d.msg));
        socket.on('user_left', (d) => addMessage('system', '', d.msg));
    </script>
</body>
</html>
